<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100%" height="100%">
  <rect width="100" height="100" rx="22" fill="#0f172a" />
  <!-- Elegant glowing background card effect -->
  <circle cx="50" cy="50" r="38" fill="#1e293b" />
  <!-- Clock hands and ring representing Time Tracking -->
  <circle cx="50" cy="50" r="28" fill="none" stroke="#3b82f6" stroke-width="4.5" />
  <!-- Hand details -->
  <line x1="50" y1="50" x2="50" y2="30" stroke="#3b82f6" stroke-width="4.5" stroke-linecap="round" />
  <line x1="50" y1="50" x2="68" y2="50" stroke="#60a5fa" stroke-width="4.5" stroke-linecap="round" />
  <!-- Center dot -->
  <circle cx="50" cy="50" r="5" fill="#f8fafc" />
  <!-- Small Euro Accent inside the dial -->
  <path d="M 40,65 Q 40,55 50,55 M 40,60 L 46,60 M 40,57 L 46,57" stroke="#10b981" stroke-width="2.5" stroke-linecap="round" fill="none" />
</svg>
